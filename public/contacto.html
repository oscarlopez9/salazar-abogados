<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Salazar & Abogados</title>
    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

<header class="header">
    <div class="nav-container">
        <div class="logo-container">
            <img src="logo.png" class="logo">
        </div>

        <nav id="menu">
            <a href="index.html">Inicio</a>
            <a href="nosotros.html">Nosotros</a>
            <a href="servicios.html">Soluciones</a>
            <a href="equipo.html">Equipo</a>
            <a href="blog.html">Blog</a>
            <a href="contacto.html">Contacto</a>
        </nav>

        <div class="menu-toggle" onclick="toggleMenu()">☰</div>
    </div>
</header>

<section class="contacto">
    <h1>Contacto</h1>

    <div class="contacto-container">

        <div class="contacto-info">
            <p><strong>Teléfono:</strong> +57 310 773 6496</p>
            <p><strong>Email:</strong> correo@salazaryabogadosasociados.com</p>
            <p><strong>Dirección:</strong> Pensilvania Caldas</p>
        </div>

        <form action="https://formsubmit.co/correo@salazaryabogadosasociados.com" method="POST" class="contacto-form">
            <input type="text" name="nombre" placeholder="Nombre" required>
            <input type="email" name="email" placeholder="Correo electrónico" required>
            <input type="text" name="telefono" placeholder="Teléfono">
            <textarea name="mensaje" placeholder="Escriba su mensaje aquí..." required></textarea>
            <button type="submit" class="btn">Enviar mensaje</button>
        </form>

    </div>
</section>

<footer class="footer">
    <div class="footer-bottom">
        <p>© 2026 Salazar & Abogados Asociados</p>
    </div>
</footer>

<script src="script.js"></script>
</body>
</html>
